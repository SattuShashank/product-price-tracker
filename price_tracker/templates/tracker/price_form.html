{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'tracker/css/forms.css' %}">
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button type="submit" class="btn">Save Price Record</button>
        </form>

        <a href="{% url 'home' %}" class="back-link">Back to Home</a>
    </div>
</body>
</html>
